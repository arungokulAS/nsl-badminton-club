{% if not groups_locked %}
    <div style="color:#ff6b6b;background:rgba(128,0,255,0.10);padding:10px 18px;border-radius:8px;font-weight:500;">Groups must be locked before selecting courts.</div>
{% elif not locked_num_courts %}
    <form method="post" id="lock-courts-form" style="display:flex;gap:12px;align-items:center;background:none;border:none;padding:12px 0;justify-content:center;width:100%;">
        {% csrf_token %}
        <input type="hidden" name="lock_courts" value="1">
        <label for="num_courts" style="font-weight:500;color:#fff;background:rgba(128,0,255,0.18);padding:4px 10px;border-radius:8px;">Number of Courts:</label>
        <select name="num_courts" id="num_courts" required>
            <option value="">Select</option>
            {% for i in court_range %}
                <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>
        <input type="password" name="admin_password" placeholder="Admin Password" required style="border-radius:8px;padding:4px 10px;">
        <button type="submit" name="lock_courts" style="background:linear-gradient(120deg,rgba(128,0,255,0.32) 0%,rgba(80,0,120,0.32) 100%);color:#fff;border:none;border-radius:8px;padding:6px 18px;font-weight:600;box-shadow:0 2px 12px 0 rgba(128,0,255,0.10);">Lock Courts</button>
    </form>
{% else %}
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:none;border:none;padding:12px 0;width:100%;">
        <div style="display:flex;gap:12px;align-items:center;justify-content:center;width:100%;">
            <span style="font-weight:500;color:#fff;background:rgba(128,0,255,0.18);padding:4px 10px;border-radius:8px;">Courts locked: <b>{{ locked_num_courts }}</b></span>
            <form method="post" style="display:inline;">
                {% csrf_token %}
                <input type="password" name="admin_password" placeholder="Admin Password to Unlock" required style="border-radius:8px;padding:4px 10px;">
                <button type="submit" name="unlock_courts" style="background:linear-gradient(120deg,rgba(255,0,128,0.32) 0%,rgba(120,0,80,0.32) 100%);color:#fff;border:none;border-radius:8px;padding:6px 18px;font-weight:600;box-shadow:0 2px 12px 0 rgba(255,0,128,0.10);">Unlock Court Selection</button>
            </form>
        </div>
        <!-- Show Generate Schedule button for current round -->
        <form method="post" id="generate-schedule-form" style="margin-top:10px;display:flex;justify-content:center;width:100%;">
            {% csrf_token %}
            <input type="hidden" name="generate_schedule" value="1">
            <input type="hidden" name="round" value="{{ next_round.id }}">
            <input type="hidden" name="num_courts" value="{{ locked_num_courts }}">
            <button type="submit" style="background:linear-gradient(120deg,rgba(128,0,255,0.32) 0%,rgba(80,0,120,0.32) 100%);color:#fff;border:none;border-radius:8px;padding:10px 32px;font-weight:700;font-size:1.15em;box-shadow:0 2px 12px 0 rgba(128,0,255,0.10);">Generate Schedule for {{ next_round.name }}</button>
        </form>
    </div>
{% endif %}
