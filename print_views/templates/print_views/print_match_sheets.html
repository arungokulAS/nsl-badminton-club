{% extends "base.html" %}
{% block content %}
<h1>Printable Match Sheets</h1>
<table border="1" cellspacing="0" cellpadding="6">
    <thead>
        <tr>
            <th>Round</th>
            <th>Court</th>
            <th>Team 1</th>
            <th>Team 2</th>
            <th>Score (T1)</th>
            <th>Score (T2)</th>
            <th>Referee</th>
            <th>Notes</th>
        </tr>
    </thead>
    <tbody>
    {% for match in matches %}
        <tr>
            <td>{{ match.round.name }}</td>
            <td>{{ match.court.name }}</td>
            <td>{{ match.team1.team_name }}</td>
            <td>{{ match.team2.team_name }}</td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    {% endfor %}
    </tbody>
</table>
<button onclick="window.print()">Print</button>
{% endblock %}
