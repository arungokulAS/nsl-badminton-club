{% extends "base.html" %}
{% block content %}
<div class="admin-hero-bg"></div>
<section class="admin-hero-section">
    <div class="admin-hero-content">
        <div class="admin-hero-title">Print</div>
        <div class="print-tabs">
            <a class="print-tab" href="/print/teams">TEAM LIST</a>
            <a class="print-tab" href="/print/groups">GROUP LIST</a>
            <a class="print-tab" href="/print/emerging-teams">EMERGING TEAM</a>
            <a class="print-tab" href="/print/schedule">SCHEDULE</a>
            <a class="print-tab" href="/print/matches">SCORE SHEET</a>
        </div>
    </div>
</section>
<style>
body {
    background: #0a0015 !important;
}
.admin-hero-bg {
    position: absolute;
    top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
}
.admin-hero-bg::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 800px;
    height: 800px;
    transform: translate(-50%, -50%) scale(1);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(168,85,247,0.3) 0%, rgba(139,92,246,0.15) 20%, rgba(88,28,135,0.08) 40%, transparent 70%);
    filter: blur(60px);
    opacity: 0.5;
    animation: admin-hero-bg-pulse 4s ease-in-out infinite;
    z-index: 0;
}
@keyframes admin-hero-bg-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
    50% { transform: translate(-50%, -50%) scale(1.05); opacity: 0.8; }
}
.admin-hero-section {
    min-height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
}
.admin-hero-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
}
.admin-hero-title {
    font-size: 7rem;
    font-weight: 700;
    color: rgba(255,255,255,0.95);
    text-shadow: 0 0 40px rgba(255,255,255,0.3);
    letter-spacing: -0.02em;
    margin-bottom: 0.2rem;
    animation: admin-float 6s ease-in-out infinite;
    transition: font-size 0.3s;
}
@keyframes admin-float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
}
.print-tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}
.print-tab {
    border: 1px solid rgba(168,85,247,0.4);
    background: transparent;
    color: #c9a3ff;
    padding: 8px 16px;
    border-radius: 16px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}
@media (max-width: 479px) {
    .admin-hero-title { font-size: 3.2rem; }
}
</style>
{% endblock %}
