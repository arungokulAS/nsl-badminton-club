
{% extends 'base.html' %}
{% block content %}
<div style="position:relative;z-index:1;min-height:40px;">
    <div class="teams-bg-title" aria-hidden="true">TEAMS</div>
</div>
<div class="teams-admin-content" style="margin-top:-4px;">
    <h2 class="teams-title-glass" style="margin-top:0.5em;">Team List</h2>
    <table class="teams-table" style="background:none!important;box-shadow:none!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;position:relative;top:-2px;width:100%;max-width:900px;margin:0 auto 32px auto;">
        <thead style="margin-top:0;">
            <tr style="background: linear-gradient(90deg, rgba(160,32,240,0.4) 0%, rgba(111,0,255,0.4) 100%);">
                <th style="color:#fff;">#</th>
                <th style="color:#fff;text-align:left;">Player 1</th>
                <th style="color:#fff;text-align:left;">Player 2</th>
                <th style="color:#fff;text-align:left;">Team Name</th>
            </tr>
        </thead>
        <tbody>
            {% for team in teams %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td style="text-align:left;">{{ team.player1_name }}</td>
                <td style="text-align:left;">{{ team.player2_name }}</td>
                <td style="text-align:left;">{{ team.team_name }}</td>
            </tr>
            {% if not forloop.last %}
            <tr>
                <td colspan="4" style="padding:0;border:none;background:none;">
                    <div style="height:2px;width:100%;background:linear-gradient(90deg,rgba(128,0,255,0) 0%,rgba(128,0,255,0.25) 50%,rgba(128,0,255,0) 100%);"></div>
                </td>
            </tr>
            {% endif %}
            {% endfor %}
        </tbody>
    </table>
</div>
<style>
body {
    background: url('/static/envato-labs-image-edit (1).png') center center/cover no-repeat fixed, linear-gradient(120deg, #1a1a2e 0%, #16213e 100%) !important;
    color: #fff !important;
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
}
/* Container for table and heading */
.teams-admin-content {
    max-width: 1100px;
    margin: 0 auto 40px auto;
    background: none !important;
    border: none !important;
    border-radius: 28px;
    box-shadow: none !important;
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    padding: 38px 36px 36px 36px;
    color: #fff;
    position: relative;
    z-index: 2;
}
/* Glass gradient title for Teams */
.teams-title-glass {
    text-align: center;
    font-size: 3.5rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin-bottom: 2.2rem;
    background: linear-gradient(to bottom, rgba(168,85,247,0.95) 0%, rgba(139,92,246,0.85) 60%, rgba(88,28,135,0.45) 85%, rgba(255,255,255,0.0) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-fill-color: transparent;
    filter: drop-shadow(0 4px 32px rgba(128,0,255,0.18)) drop-shadow(0 1.5px 0 rgba(255,255,255,0.10));
    position: relative;
    z-index: 2;
    padding-top: 0.5rem;
    padding-bottom: 0.5rem;
    /* Glass effect */
    backdrop-filter: blur(2.5px) saturate(1.2);
    -webkit-backdrop-filter: blur(2.5px) saturate(1.2);
}
/* Huge background title */
.teams-bg-title {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12vw;
    font-weight: 900;
    color: #fff;
    opacity: 0.07;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    pointer-events: none;
    user-select: none;
    z-index: 0;
    white-space: nowrap;
    line-height: 1;
    filter: blur(0.5px);
    -webkit-mask-image: linear-gradient(to bottom, #fff 50%, transparent 100%);
    mask-image: linear-gradient(to bottom, #fff 50%, transparent 100%);
    width: 100vw;
    text-align: center;
}
</style>
{% endblock %}
