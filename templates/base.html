<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Tournament Management System</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/liquid_glass_nav.css">
        {% load static %}
        <style>
                                                            table, th, td, thead, tbody, tr {
                                                                color: #fff !important;
                                                            }
                                                table {
                                                    margin-left: auto;
                                                    margin-right: auto;
                                                    margin-top: 80px;
                                                    background: rgba(0,0,0,0.05);
                                                    border-radius: 18px;
                                                    box-shadow: 0 4px 24px 0 rgba(0,0,0,0.10);
                                                    backdrop-filter: blur(8px);
                                                    -webkit-backdrop-filter: blur(8px);
                                                    color: #fff;
                                                    width: auto;
                                                    border-collapse: separate;
                                                    border-spacing: 0;
                                                    overflow: hidden;
                                                }
                                                th, td {
                                                    text-align: center;
                                                    padding: 0.7em 1.2em;
                                                    background: transparent;
                                                }
                                                thead th {
                                                    font-weight: 600;
                                                    background: rgba(0,0,0,0.08);
                                                }

                                    /* OVERRIDE external nav CSS for dropdowns */
                                    .liquid-glass-dropdown {
                                        top: 100% !important;
                                        bottom: auto !important;
                                        left: 50% !important;
                                        transform: translateX(-50%) !important;
                                        min-width: 180px !important;
                                        width: 200px !important;
                                        background: rgba(0,0,0,0.05) !important;
                                        border-radius: 16px !important;
                                        box-shadow: 0 4px 24px 0 rgba(0,0,0,0.18) !important;
                                        padding: 0.3rem 0.1rem 0.3rem 0.1rem !important;
                                        display: none;
                                        box-sizing: border-box !important;
                                        backdrop-filter: blur(8px) !important;
                                        align-items: stretch !important;
                                    }
                                    .liquid-glass-dropdown .dropdown-item {
                                        width: 100% !important;
                                        box-sizing: border-box !important;
                                        background: none !important;
                                        color: #fff !important;
                                        text-align: left !important;
                                        padding: 0.5rem 1.5rem !important;
                                        border-radius: 8px !important;
                                        margin: 0 !important;
                                    }
                                    .liquid-glass-dropdown .dropdown-item:hover,
                                    .liquid-glass-dropdown .dropdown-item:focus {
                                        background: rgba(60,60,60,0.18) !important;
                                        color: #fff !important;
                                    }
                        .dropdown-item {
                            background: transparent;
                            color: #fff;
                            border: none;
                            width: 100%;
                            text-align: left;
                            padding: 0.5rem 1.5rem;
                            font-size: 1rem;
                            border-radius: 8px;
                            margin: 0;
                            cursor: pointer;
                            transition: background 0.18s;
                            box-sizing: border-box;
                            display: block;
                        }
                        .dropdown-item:hover, .dropdown-item:focus {
                            background: rgba(60,60,60,0.18);
                            color: #fff;
                        }
            body {
                background: url('{% static "envato-labs-image-edit (1).png" %}') no-repeat center center fixed;
                background-size: cover;
                min-height: 100vh;
                width: 100vw;
                margin: 0;
                padding: 0;
            }
            .liquid-glass-navbar {
                position: fixed;
                top: 32px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 100;
                width: max-content;
                min-width: 340px;
                max-width: 480px;
                min-height: 40px;
                max-height: 48px;
                background: rgba(0,0,0,0.05);
                border-radius: 32px;
                box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
                backdrop-filter: blur(8px);
                display: flex;
                align-items: center;
            }
            .liquid-glass-dropdown {
                z-index: 101;
                position: absolute;
                left: 50%;
                top: 100%;
                transform: translateX(-50%);
                min-width: 180px;
                width: 200px;
                background: rgba(30,30,30,0.55);
                border-radius: 16px;
                box-shadow: 0 4px 24px 0 rgba(0,0,0,0.18);
                padding: 0.3rem 0.1rem 0.3rem 0.1rem;
                display: none;
                box-sizing: border-box;
                backdrop-filter: blur(8px);
                align-items: stretch;
            }
            .liquid-glass-dropdown .dropdown-item {
                width: 100%;
                box-sizing: border-box;
            }
            .nav-icon {
                position: relative;
                display: inline-block;
            }
            .nav-icon.active .liquid-glass-dropdown {
                display: block;
            }
            /* Lighter overlay for readability, but more image visible */
            body:before {
                content: '';
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.10);
                z-index: 1;
                pointer-events: none;
            }
            main, .container, .content {
                position: relative;
                z-index: 2;
            }
        </style>
</head>
<body>
        <div class="liquid-glass-navbar" id="glass-navbar">
            <div class="nav-icon" onclick="location.href='/'">
                <svg viewBox="0 0 32 32"><path d="M4 16L16 6l12 10" stroke="white" stroke-width="2" fill="none"/><rect x="8" y="16" width="16" height="10" rx="2" stroke="white" stroke-width="2" fill="none"/></svg>
            </div>
            <div class="nav-icon" data-dropdown="tournament-dropdown" onclick="toggleDropdown(event, this)">
                <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="13" stroke="white" stroke-width="2" fill="none"/><path d="M10 22l6-12 6 12" stroke="white" stroke-width="2" fill="none"/></svg>
                <div class="liquid-glass-dropdown" id="tournament-dropdown">
                    <button class="dropdown-item" onclick="location.href='/tournament/teams'">Teams</button>
                    <button class="dropdown-item" onclick="location.href='/tournament/groups'">Groups</button>
                    <button class="dropdown-item" onclick="location.href='/tournament/schedule'">Schedule</button>
                    <button class="dropdown-item" onclick="location.href='/tournament/live'">Live</button>
                    <button class="dropdown-item" onclick="location.href='/tournament/results'">Results</button>
                </div>
            </div>
            <div class="nav-icon" data-dropdown="referee-dropdown" onclick="toggleDropdown(event, this)">
                <svg viewBox="0 0 32 32"><rect x="8" y="8" width="16" height="16" rx="4" stroke="white" stroke-width="2" fill="none"/><path d="M16 12v8" stroke="white" stroke-width="2"/><path d="M12 16h8" stroke="white" stroke-width="2"/></svg>
                <div class="liquid-glass-dropdown" id="referee-dropdown-nav">
                    {% include 'partials/referee_dropdown_nav.html' %}
                </div>
            </div>
            <div class="nav-icon" onclick="location.href='/print/team'">
                <svg viewBox="0 0 32 32"><rect x="6" y="10" width="20" height="12" rx="3" stroke="white" stroke-width="2" fill="none"/><rect x="10" y="6" width="12" height="6" rx="2" stroke="white" stroke-width="2" fill="none"/></svg>
            </div>
            <div class="nav-icon" onclick="location.href='/contact'">
                <svg viewBox="0 0 32 32"><path d="M4 8l12 10 12-10" stroke="white" stroke-width="2" fill="none"/><rect x="4" y="8" width="24" height="16" rx="4" stroke="white" stroke-width="2" fill="none"/></svg>
            </div>
            <div class="nav-icon" data-dropdown="admin-dropdown" onclick="toggleDropdown(event, this)">
                <svg viewBox="0 0 32 32"><circle cx="16" cy="12" r="6" stroke="white" stroke-width="2" fill="none"/><rect x="8" y="20" width="16" height="8" rx="4" stroke="white" stroke-width="2" fill="none"/></svg>
                <div class="liquid-glass-dropdown" id="admin-dropdown">
                    {% if request.session.is_admin %}
                        <button class="dropdown-item" onclick="location.href='/admin/teams'">Teams</button>
                        <button class="dropdown-item" onclick="location.href='/admin/groups'">Groups</button>
                        <button class="dropdown-item" onclick="location.href='/admin/schedule'">Schedule</button>
                        <button class="dropdown-item" onclick="location.href='/admin/live-manage'">Live Manage</button>

                        <button class="dropdown-item" onclick="location.href='/admin/logout'">Logout</button>
                    {% else %}
                        <button class="dropdown-item" onclick="location.href='/admin/login'">Login</button>
                    {% endif %}
                </div>
            </div>
        </div>
        <script src="/static/liquid_glass_nav.js"></script>
        <script>
        function toggleDropdown(e, icon) {
            e.stopPropagation();
            // Close all other dropdowns
            document.querySelectorAll('.nav-icon.active').forEach(function(el) {
                if (el !== icon) el.classList.remove('active');
            });
            // Toggle this one
            icon.classList.toggle('active');
        }
        // Close dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            document.querySelectorAll('.nav-icon.active').forEach(function(el) {
                el.classList.remove('active');
            });
        });
        // Prevent closing when clicking inside dropdown
        document.querySelectorAll('.liquid-glass-dropdown').forEach(function(drop) {
            drop.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        });
        </script>
    <div class="background">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
