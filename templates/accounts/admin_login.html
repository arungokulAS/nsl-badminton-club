
{% extends 'base.html' %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:none;">
  <form method="post" style="display:flex;flex-direction:column;align-items:center;justify-content:center;background:none;border:none;box-shadow:none;padding:0;">
      <h2 style="color:#fff;text-align:center;margin-bottom:24px;text-shadow:0 2px 8px rgba(0,0,0,0.25);font-family:'Inter','Segoe UI',Arial,sans-serif;">Admin Login</h2>
      {% if error %}<div style="color:#c00;margin-bottom:12px;">{{ error }}</div>{% endif %}
      {% csrf_token %}
      <input type="password" id="password" name="password" required placeholder="Password" style="width:60%;min-width:120px;max-width:220px;padding:10px 14px;margin:18px 0 24px 0;border-radius:12px;border:1px solid #a020f0;background:rgba(30,30,40,0.55);color:#fff;font-size:1.08rem;font-family:'Inter','Segoe UI',Arial,sans-serif;box-shadow:0 2px 8px 0 rgba(31,38,135,0.10);text-align:center;">
      <button type="submit" style="background:linear-gradient(120deg,rgba(20,20,40,0.92) 0%,rgba(60,30,120,0.92) 100%);color:#fff;border:none;border-radius:12px;padding:0.32em 1em;font-size:1.02em;font-family:'Inter','Segoe UI',Arial,sans-serif;font-weight:500;cursor:pointer;margin:0 4px;outline:none;box-shadow:0 2px 12px 0 rgba(120,80,255,0.18),0 0 0 2px rgba(120,80,255,0.18) inset,0 1.5px 0 0 rgba(255,255,255,0.10) inset;transition:background 0.22s cubic-bezier(.4,0,.2,1),box-shadow 0.22s cubic-bezier(.4,0,.2,1),transform 0.18s cubic-bezier(.4,0,.2,1),opacity 0.18s;position:relative;min-width:84px;min-height:32px;letter-spacing:0.01em;text-align:center;user-select:none;overflow:hidden;">Login</button>
  </form>
</div>
{% endblock %}
