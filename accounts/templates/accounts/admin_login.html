{% extends 'base.html' %}
{% block content %}
<h2>Admin Login</h2>
<form method="post">
    {% csrf_token %}
    <label for="password">Admin Password:</label>
    <input type="password" id="password" name="password" required>
    <button type="submit">Login</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
</form>
{% endblock %}
