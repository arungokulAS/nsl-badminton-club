{% extends 'base.html' %}
{% load referee_extras %}
{% block content %}
<style>
    .live-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: none;
        box-shadow: 0 2px 18px 0 rgba(120,180,255,0.10);
        color: #fff;
        font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        font-size: 1.08rem;
        overflow: hidden;
        margin: 0 auto;
        border-radius: 28px;
        border-left: 1px solid rgba(128,0,255,0.25) !important;
        border-right: 1px solid rgba(128,0,255,0.25) !important;
        border-bottom: 1px solid rgba(128,0,255,0.25) !important;
        border-top: none !important;
    }
    .live-table th, .live-table td {
        border: none !important;
        background: none;
        color: #fff;
        padding: 0.85em 1.2em;
        font-weight: 400;
        text-align: left;
        transition: background 0.25s, box-shadow 0.25s, color 0.18s;
    }
    .live-table th {
        background: linear-gradient(120deg, rgba(60,30,120,0.32) 0%, rgba(30,60,120,0.28) 100%);
        font-weight: 500;
        color: #fff;
        border-top-left-radius: 18px;
        border-top-right-radius: 18px;
        height: 54px;
        font-size: 1.09rem;
        letter-spacing: 0.01em;
    }
    .live-table tr:last-child td {
        border: none !important;
        border-bottom: 1px solid rgba(128,0,255,0.25) !important;
    }
    .live-table th:first-child {
        border-top-left-radius: 18px;
    }
    .live-table th:last-child {
        border-top-right-radius: 18px;
    }
    .live-table td:last-child {
        text-align: center;
    }
    .live-table tbody tr:not(:last-child)::after {
        content: '';
        display: block;
        height: 2px;
        margin-top: -2px;
        background: linear-gradient(90deg, rgba(128,0,255,0) 0%, rgba(128,0,255,0.25) 50%, rgba(128,0,255,0) 100%);
        pointer-events: none;
    }
    .live-table tbody tr:not(:last-child) td {
        border-bottom: 1px solid rgba(128,0,255,0.25) !important;
    }
    .schedule-title-glass {
        text-align: center;
        font-size: 3.5rem;
        font-weight: 800;
        letter-spacing: -0.01em;
        margin-bottom: 2.2rem;
        background: linear-gradient(to bottom, rgba(168,85,247,0.95) 0%, rgba(139,92,246,0.85) 60%, rgba(88,28,135,0.45) 85%, rgba(255,255,255,0.0) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-fill-color: transparent;
        filter: drop-shadow(0 4px 32px rgba(128,0,255,0.18)) drop-shadow(0 1.5px 0 rgba(255,255,255,0.10));
        position: relative;
        z-index: 2;
        padding-top: 0.5rem;
        padding-bottom: 0.5rem;
        backdrop-filter: blur(2.5px) saturate(1.2);
        -webkit-backdrop-filter: blur(2.5px) saturate(1.2);
        text-transform: uppercase;
    }
    .schedule-bg-title {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12vw;
        font-weight: 900;
        color: #fff;
        opacity: 0.07;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        pointer-events: none;
        user-select: none;
        z-index: 0;
        white-space: nowrap;
        line-height: 1;
        filter: blur(0.5px);
        -webkit-mask-image: linear-gradient(to bottom, #fff 50%, transparent 100%);
        mask-image: linear-gradient(to bottom, #fff 50%, transparent 100%);
    }
</style>
<div style="margin-top:110px;">
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <h2 class="schedule-title-glass">Live Match</h2>
        <div class="schedule-bg-title" aria-hidden="true">LIVE MATCH</div>
    </div>
    <div style="text-align:center;color:#fff;font-weight:500;margin-top:-6px;margin-bottom:18px;opacity:0.85;">{% if current_round %}{{ current_round.name }}{% else %}Round{% endif %}</div>
    <div style="height:12px;"></div>

    <div id="live-manage-table">
        {% include 'referee/partials/admin_live_manage_table.html' %}
    </div>
</div>
<script>
    const liveManageIntervalMs = 5000;
    const liveManageEndpoint = '/referee/admin/live-manage/fragment';

    async function refreshLiveManage() {
        try {
            const response = await fetch(liveManageEndpoint, { cache: 'no-store' });
            if (!response.ok) {
                return;
            }
            const data = await response.json();
            if (data && data.html) {
                const container = document.getElementById('live-manage-table');
                if (container) {
                    container.innerHTML = data.html;
                }
            }
        } catch (error) {
            console.warn('Live manage refresh failed', error);
        }
    }

    setInterval(refreshLiveManage, liveManageIntervalMs);
</script>
{% endblock %}
